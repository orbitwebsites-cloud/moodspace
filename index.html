<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoodSpace — A gentle space for your thoughts</title>

    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
    <!-- Fonts: Plus Jakarta Sans + Be Vietnam Pro -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="./style.css" />

    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
  </head>
  <body>
    <div id="app">

      <!-- Header -->
      <header id="app-header">
        <div class="header-row">
          <div class="header-brand">
            <div class="header-avatar">🌿</div>
            <span class="header-logo">MoodSpace</span>
          </div>
        </div>
        <h1 class="title" id="main-title">How are you feeling?</h1>
        <p class="subtitle" id="main-subtitle">This is a safe space — just for you.</p>
      </header>

      <!-- Main Content Area -->
      <main id="main-content">
        <!-- Populated by main.js based on current view -->
      </main>

      <!-- Bottom Tab Bar -->
      <nav id="tab-bar">
        <button class="tab-btn active" data-tab="checkin">
          <span class="material-symbols-outlined tab-icon">self_improvement</span>
          <span class="tab-label">Check-in</span>
        </button>
        <button class="tab-btn" data-tab="insights">
          <span class="material-symbols-outlined tab-icon">bar_chart</span>
          <span class="tab-label">Insights</span>
        </button>
        <button class="tab-btn" data-tab="chat">
          <span class="material-symbols-outlined tab-icon">chat_bubble</span>
          <span class="tab-label">AI Chat</span>
        </button>
        <button class="tab-btn" data-tab="resources">
          <span class="material-symbols-outlined tab-icon">volunteer_activism</span>
          <span class="tab-label">Resources</span>
        </button>
        <button class="tab-btn" data-tab="settings">
          <span class="material-symbols-outlined tab-icon">manage_accounts</span>
          <span class="tab-label">Settings</span>
        </button>
      </nav>

    </div>

    <!-- Local dev only: sets window.MOODSPACE_CONFIG (gitignored) -->
    <script src="./config.js" onerror="void 0"></script>
    <!-- Bridges local config.js ↔ Vercel /api/config -->
    <script src="./config-loader.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
